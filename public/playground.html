<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether-Lite Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0f;
      --surface:  #141418;
      --border:   #252530;
      --muted:    #4a4a60;
      --text:     #d8d8e8;
      --accent:   #7c3aed;
      --accent2:  #a78bfa;
      --green:    #34d399;
      --red:      #f87171;
      --radius:   8px;
      --mono:     "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px; height: 52px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; color: var(--accent2); letter-spacing: 0.03em; }
    .pill { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: #7c3aed22; color: var(--accent2); font-weight: 500; }
    .tabs { display: flex; gap: 2px; margin-left: auto; }
    .tab {
      font-size: 12px; padding: 5px 14px; border-radius: var(--radius);
      background: none; border: 1px solid transparent;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Panels ── */
    .panels { flex: 1; display: none; overflow: hidden; }
    .panels.active { display: flex; }

    /* ── Vibe Builder panel ── */
    #panel-vibe { gap: 0; }
    .vibe-left {
      width: 380px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 20px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
    }
    .vibe-right { flex: 1; display: flex; flex-direction: column; }

    /* ── Sandbox Chat panel ── */
    #panel-chat { gap: 0; }
    .chat-sidebar {
      width: 280px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .msg { max-width: 78%; padding: 10px 14px; border-radius: var(--radius); font-size: 13.5px; line-height: 1.55; }
    .msg.user      { align-self: flex-end;   background: #7c3aed28; border: 1px solid #7c3aed44; }
    .msg.assistant { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
    .msg.system    { align-self: center; color: var(--muted); font-size: 12px; font-style: italic; border: none; }
    .msg.error     { align-self: center; color: var(--red); font-size: 12px; }
    .typing        { opacity: 0.5; }
    .chat-input-row { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .chat-input-row textarea { flex: 1; resize: none; }

    /* ── Workbench panel ── */
    #panel-bench { display: none; flex-direction: column; gap: 0; }
    #panel-bench.active { display: flex; }
    .bench-layout { display: flex; flex: 1; overflow: hidden; gap: 0; }
    .bench-sidebar {
      width: 200px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .bench-nav button {
      width: 100%; text-align: left; padding: 10px 16px;
      background: none; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer; border-left: 3px solid transparent;
    }
    .bench-nav button.active, .bench-nav button:hover { color: var(--text); background: var(--bg); }
    .bench-nav button.active { border-left-color: var(--accent); }
    .bench-pane { flex: 1; display: none; flex-direction: column; padding: 20px; gap: 12px; overflow-y: auto; }
    .bench-pane.active { display: flex; }

    /* ── Shared form elements ── */
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    input, textarea, select {
      width: 100%; padding: 8px 10px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; }
    textarea.mono { font-family: var(--mono); font-size: 12px; }
    select option { background: var(--surface); }

    button {
      padding: 8px 16px; border-radius: var(--radius);
      background: var(--accent); color: #fff; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { background: #6d28d9; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.outline { background: none; border: 1px solid var(--border); color: var(--text); }
    button.outline:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); background: none; }
    button.danger { background: #7f1d1d22; border: 1px solid var(--red); color: var(--red); }
    button.full { width: 100%; }

    /* ── Output areas ── */
    .output {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px;
      font-family: var(--mono); font-size: 12px; line-height: 1.6;
      overflow-y: auto; white-space: pre-wrap; word-break: break-word;
      min-height: 120px;
    }
    .output.img-out { display: flex; align-items: center; justify-content: center; min-height: 200px; }
    .output.img-out img { max-width: 100%; max-height: 400px; border-radius: var(--radius); }

    /* ── Misc ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .row   { display: flex; gap: 8px; align-items: flex-end; }
    .row > * { flex: 1; }
    hr { border: none; border-top: 1px solid var(--border); }
    .sandbox-meta {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px;
      font-size: 11px; color: var(--muted); font-family: var(--mono);
      word-break: break-all;
    }
    .badge-model {
      display: inline-block; font-size: 10px; padding: 2px 7px;
      border-radius: 99px; background: #22234a; color: var(--accent2);
      font-family: var(--mono);
    }
    .status { font-size: 12px; padding: 6px 10px; border-radius: var(--radius); }
    .status.ok  { background: #052e1a; color: var(--green); }
    .status.err { background: #2e0505; color: var(--red);   }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<header>
  <h1>Aether-Lite</h1>
  <span class="pill">Playground</span>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('vibe')">Vibe Builder</button>
    <button class="tab" onclick="switchTab('chat')">Sandbox Chat</button>
    <button class="tab" onclick="switchTab('bench')">AI Workbench</button>
  </div>
  <a href="/apps" style="margin-left:auto;text-decoration:none">
    <button style="padding:5px 14px;border-radius:8px;background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer" onmouseover="this.style.borderColor='var(--accent2)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">My Apps ↗</button>
  </a>
</header>

<!-- ── Vibe Builder ── -->
<div id="panel-vibe" class="panels active" style="display:flex">
  <div class="vibe-left">
    <div class="field">
      <label>Describe your app</label>
      <textarea id="vibe-desc" rows="5" placeholder="e.g. A customer support agent that helps users troubleshoot login issues, escalates billing problems, and always responds in a friendly, concise tone."></textarea>
    </div>
    <div class="field">
      <label>Name (optional)</label>
      <input id="vibe-name" type="text" placeholder="Auto-generated if blank" />
    </div>
    <button id="vibe-btn" class="full" onclick="doVibe()">Generate Sandbox →</button>
    <hr />
    <label style="margin-bottom:4px">Starter templates</label>
    <div id="templates" style="display:flex;flex-direction:column;gap:6px"></div>
    <hr />
    <label style="margin-bottom:4px">Import sandbox</label>
    <textarea id="import-json" rows="4" class="mono" placeholder="Paste exported config JSON from another instance…"></textarea>
    <button id="import-btn" class="full outline" onclick="doImport()">Import →</button>
  </div>
  <div class="vibe-right" style="padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto">
    <label>Generated sandbox config</label>
    <div id="vibe-out" class="output" style="flex:1;min-height:300px">Describe your app and click "Generate Sandbox" to get started.</div>
    <div id="vibe-status" style="display:none"></div>
    <div id="vibe-actions" style="display:none;flex-direction:column;gap:10px">
      <div class="row">
        <a id="launch-app-link" href="#" target="_blank" style="flex:1;text-decoration:none">
          <button class="full" style="background:var(--green);color:#000;font-weight:600">Launch App ↗</button>
        </a>
        <button id="goto-chat-btn" class="outline" onclick="gotoChatFromVibe()" style="flex:1">Open in Chat</button>
      </div>
      <div class="field">
        <label>Embed code</label>
        <div style="display:flex;gap:6px">
          <input id="embed-out" type="text" readonly style="flex:1;font-family:var(--mono);font-size:11px" />
          <button class="outline" style="flex-shrink:0;padding:6px 12px" onclick="copyEmbed()">Copy</button>
        </div>
      </div>
      <div class="field">
        <label>Short API</label>
        <input id="short-api-out" type="text" readonly style="font-family:var(--mono);font-size:11px" />
      </div>
      <div class="field">
        <label>Export config (paste into another instance to clone this app)</label>
        <div style="display:flex;gap:6px">
          <input id="export-out" type="text" readonly style="flex:1;font-family:var(--mono);font-size:11px" />
          <button class="outline" style="flex-shrink:0;padding:6px 12px" onclick="copyExport()">Copy</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Sandbox Chat ── -->
<div id="panel-chat" class="panels" style="display:none">
  <div class="chat-sidebar">
    <div class="field">
      <label>Sandbox ID</label>
      <input id="chat-id" type="text" placeholder="Paste a sandbox UUID" />
    </div>
    <button class="full outline" onclick="loadSandbox()">Load</button>
    <hr />
    <div id="sandbox-meta" class="sandbox-meta" style="display:none"></div>
    <div id="config-editor" style="display:none;flex-direction:column;gap:8px;margin-top:8px">
      <hr/>
      <label>Edit config</label>
      <div id="integrity-badge" style="display:none;font-family:var(--mono);font-size:10px;word-break:break-all;opacity:0.65;padding:4px 6px;background:var(--surface);border-radius:4px"></div>
      <div id="tamper-warn" style="display:none;color:#ef4444;font-size:11px;font-weight:600;padding:4px 0">⚠ Config tampered — hash mismatch detected</div>
      <div class="field"><label>Name</label><input id="cfg-name" type="text"/></div>
      <div class="field"><label>System Prompt</label><textarea id="cfg-sys" rows="4" class="mono"></textarea></div>
      <div class="field"><label>Model</label><input id="cfg-model" type="text"/></div>
      <div class="row">
        <div class="field"><label>Temperature</label><input id="cfg-temp" type="number" min="0" max="2" step="0.1"/></div>
        <div class="field"><label>Max Tokens</label><input id="cfg-tokens" type="number" min="1" max="8192"/></div>
      </div>
      <button id="cfg-save-btn" class="full outline" onclick="saveConfig()">Save changes</button>
      <div id="cfg-status" style="display:none"></div>
    </div>
    <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
      <button id="history-btn" class="full outline" onclick="loadHistory()" disabled>Load history</button>
      <button class="full outline danger" onclick="deleteSandbox()" id="del-btn" disabled>Delete sandbox</button>
    </div>
  </div>
  <div class="chat-main">
    <div id="messages">
      <div class="msg system">Load or create a sandbox to start chatting.</div>
    </div>
    <div class="chat-input-row">
      <textarea id="chat-input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" rows="2" disabled></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>
</div>

<!-- ── AI Workbench ── -->
<div id="panel-bench" class="panels" style="display:none">
  <div class="bench-layout">
    <div class="bench-sidebar">
      <div class="bench-nav" style="padding-top:8px">
        <button class="active" onclick="switchBench('complete', this)">Complete</button>
        <button onclick="switchBench('stream', this)">Stream</button>
        <button onclick="switchBench('embed', this)">Embed</button>
        <button onclick="switchBench('image', this)">Image Gen</button>
        <button onclick="switchBench('transcribe', this)">Transcribe</button>
      </div>
    </div>

    <!-- Complete -->
    <div id="bench-complete" class="bench-pane active">
      <div class="field"><label>Model</label><input id="bc-model" placeholder="@cf/meta/llama-3.1-8b-instruct" /></div>
      <div class="field"><label>System Prompt</label><textarea id="bc-sys" rows="3" class="mono" placeholder="You are a helpful assistant."></textarea></div>
      <div class="field"><label>Prompt</label><textarea id="bc-prompt" rows="4" class="mono" placeholder="What is the capital of France?"></textarea></div>
      <div class="row">
        <div class="field"><label>Temperature</label><input id="bc-temp" type="number" value="0.7" min="0" max="2" step="0.1" /></div>
        <div class="field"><label>Max Tokens</label><input id="bc-tokens" type="number" value="512" min="1" max="8192" /></div>
      </div>
      <button class="full" onclick="doComplete()">Run</button>
      <label>Response</label>
      <div id="bc-out" class="output"></div>
    </div>

    <!-- Stream -->
    <div id="bench-stream" class="bench-pane">
      <div class="field"><label>Model</label><input id="bs-model" placeholder="@cf/meta/llama-3.1-8b-instruct" /></div>
      <div class="field"><label>System Prompt</label><textarea id="bs-sys" rows="2" class="mono" placeholder="You are a helpful assistant."></textarea></div>
      <div class="field"><label>Prompt</label><textarea id="bs-prompt" rows="4" class="mono" placeholder="Write a haiku about Cloudflare Workers."></textarea></div>
      <button class="full" onclick="doStream()">Stream</button>
      <label>Output (streamed)</label>
      <div id="bs-out" class="output"></div>
    </div>

    <!-- Embed -->
    <div id="bench-embed" class="bench-pane">
      <div class="field"><label>Text (one per line)</label><textarea id="be-text" rows="5" class="mono" placeholder="Hello world&#10;Cloudflare Workers&#10;Embeddings rock"></textarea></div>
      <button class="full" onclick="doEmbed()">Generate Embeddings</button>
      <label>Vectors</label>
      <div id="be-out" class="output"></div>
    </div>

    <!-- Image -->
    <div id="bench-image" class="bench-pane">
      <div class="field"><label>Prompt</label><textarea id="bi-prompt" rows="3" class="mono" placeholder="A futuristic city floating in purple clouds, cinematic lighting"></textarea></div>
      <div class="field"><label>Steps (1–20)</label><input id="bi-steps" type="number" value="4" min="1" max="20" /></div>
      <button class="full" onclick="doImage()">Generate Image</button>
      <div id="bi-out" class="output img-out">Image will appear here.</div>
    </div>

    <!-- Transcribe -->
    <div id="bench-transcribe" class="bench-pane">
      <div class="field">
        <label>Audio file (wav / mp3 / m4a)</label>
        <input id="bt-file" type="file" accept="audio/*" style="padding:6px" />
      </div>
      <button class="full" onclick="doTranscribe()">Transcribe</button>
      <label>Transcript</label>
      <div id="bt-out" class="output"></div>
    </div>

  </div>
</div>

<script type="module">
  import { VibeClient } from '/vibe-sdk.js'

  const client = new VibeClient()
  let activeSandbox = null   // SandboxHandle | null
  let vibeResult    = null   // VibeResult | null

  // ── Tab switching ─────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['vibe','chat','bench'][i] === name)
    })
    document.querySelectorAll('.panels').forEach(p => {
      p.style.display = p.id === `panel-${name}` ? 'flex' : 'none'
      p.classList.toggle('active', p.id === `panel-${name}`)
    })
  }

  // ── Workbench tab switching ───────────────────────────────────────────────────
  function switchBench(name, btn) {
    document.querySelectorAll('.bench-pane').forEach(p => {
      p.classList.toggle('active', p.id === `bench-${name}`)
    })
    document.querySelectorAll('.bench-nav button').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
  }

  // ── Load templates ────────────────────────────────────────────────────────────
  async function loadTemplates() {
    try {
      const templates = await client.vibes.templates()
      const el = document.getElementById('templates')
      el.innerHTML = ''
      for (const t of templates) {
        const btn = document.createElement('button')
        btn.className = 'outline full'
        btn.style.cssText = 'text-align:left;font-size:12px;padding:7px 10px'
        btn.textContent = t.name
        btn.title = t.description
        btn.onclick = () => {
          document.getElementById('vibe-desc').value = t.description
          document.getElementById('vibe-name').value = t.name
        }
        el.appendChild(btn)
      }
    } catch {}
  }
  loadTemplates()

  // ── Vibe builder ──────────────────────────────────────────────────────────────
  async function doVibe() {
    const desc = document.getElementById('vibe-desc').value.trim()
    if (desc.length < 10) { alert('Please enter at least 10 characters.'); return }
    const name = document.getElementById('vibe-name').value.trim() || undefined
    const btn  = document.getElementById('vibe-btn')
    const out  = document.getElementById('vibe-out')
    btn.disabled = true; btn.textContent = 'Generating…'
    out.textContent = 'Asking AI to design your sandbox…'
    setStatus('vibe', null)

    try {
      vibeResult = await client.vibes.create(desc, name)
      out.textContent = JSON.stringify(vibeResult, null, 2)
      setStatus('vibe', `Sandbox created: ${vibeResult.name}`)
      document.getElementById('launch-app-link').href = vibeResult.appUrl
      document.getElementById('embed-out').value = vibeResult.embedCode
      document.getElementById('short-api-out').value = vibeResult.shortApi.run
      document.getElementById('export-out').value = JSON.stringify({
        version: 1,
        name:        vibeResult.name,
        description: vibeResult.description,
        model:       vibeResult.model,
        systemPrompt: vibeResult.config.systemPrompt,
        temperature:  vibeResult.config.temperature,
        maxTokens:    vibeResult.config.maxTokens,
        tools: [],
      })
      document.getElementById('vibe-actions').style.display = 'flex'
    } catch (e) {
      out.textContent = `Error: ${e}`
      setStatus('vibe', String(e), true)
    } finally {
      btn.disabled = false; btn.textContent = 'Generate Sandbox →'
    }
  }

  function gotoChatFromVibe() {
    if (!vibeResult) return
    document.getElementById('chat-id').value = vibeResult.sandboxId
    switchTab('chat')
    loadSandbox()
  }

  function copyEmbed() {
    const val = document.getElementById('embed-out').value
    navigator.clipboard?.writeText(val).catch(() => {})
    const btn = event.target
    const prev = btn.textContent
    btn.textContent = 'Copied!'
    setTimeout(() => { btn.textContent = prev }, 1500)
  }

  function copyExport() {
    const val = document.getElementById('export-out').value
    navigator.clipboard?.writeText(val).catch(() => {})
    const btn = event.target
    const prev = btn.textContent
    btn.textContent = 'Copied!'
    setTimeout(() => { btn.textContent = prev }, 1500)
  }

  async function doImport() {
    const raw = document.getElementById('import-json').value.trim()
    if (!raw) { alert('Paste exported sandbox JSON first.'); return }
    const btn = document.getElementById('import-btn')
    btn.disabled = true; btn.textContent = 'Importing…'
    try {
      const config = JSON.parse(raw)
      const sandbox = await client.sandbox.import(config)
      activeSandbox = sandbox
      document.getElementById('chat-id').value = sandbox.id
      document.getElementById('import-json').value = ''
      populateSandboxUI(sandbox)
      switchTab('chat')
      addMsg('system', `Imported: ${sandbox.name}`)
    } catch (e) {
      alert(`Import failed: ${e}`)
    } finally {
      btn.disabled = false; btn.textContent = 'Import →'
    }
  }

  // ── Sandbox chat ──────────────────────────────────────────────────────────────
  function populateSandboxUI(sandbox) {
    document.getElementById('sandbox-meta').style.display = 'block'
    document.getElementById('sandbox-meta').innerHTML =
      `<strong>${escHtml(sandbox.name)}</strong><br>` +
      `<span class="badge-model">${escHtml(sandbox.model)}</span><br>` +
      `<span style="opacity:0.6;font-size:10px">${escHtml(sandbox.id)}</span>`
    document.getElementById('cfg-name').value   = sandbox.name
    document.getElementById('cfg-sys').value    = sandbox.systemPrompt
    document.getElementById('cfg-model').value  = sandbox.model
    document.getElementById('cfg-temp').value   = sandbox.temperature
    document.getElementById('cfg-tokens').value = sandbox.maxTokens

    const badge = document.getElementById('integrity-badge')
    const warn  = document.getElementById('tamper-warn')
    if (sandbox.integrityHash) {
      badge.textContent = `SHA-256: ${sandbox.integrityHash}`
      badge.style.display = 'block'
    } else {
      badge.style.display = 'none'
    }
    warn.style.display = sandbox.tampered ? 'block' : 'none'

    document.getElementById('config-editor').style.display = 'flex'
    document.getElementById('chat-input').disabled  = false
    document.getElementById('send-btn').disabled    = false
    document.getElementById('del-btn').disabled     = false
    document.getElementById('history-btn').disabled = false
    setStatus('cfg', null)
  }

  async function loadSandbox() {
    const id = document.getElementById('chat-id').value.trim()
    if (!id) return
    try {
      activeSandbox = await client.sandbox.get(id)
      populateSandboxUI(activeSandbox)
      addMsg('system', `Loaded: ${activeSandbox.name}`)
    } catch (e) { addMsg('error', String(e)) }
  }

  function addMsg(role, text) {
    const el = document.createElement('div')
    el.className = `msg ${role}`
    el.textContent = text
    const msgs = document.getElementById('messages')
    msgs.appendChild(el)
    msgs.scrollTop = msgs.scrollHeight
    return el
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input')
    const text = input.value.trim()
    if (!text || !activeSandbox) return
    input.value = ''
    document.getElementById('send-btn').disabled = true
    addMsg('user', text)

    const typingEl = addMsg('assistant', '')
    typingEl.classList.add('typing')

    try {
      for await (const token of activeSandbox.stream(text)) {
        typingEl.textContent += token
        typingEl.classList.remove('typing')
        const msgs = document.getElementById('messages')
        msgs.scrollTop = msgs.scrollHeight
      }
    } catch (e) {
      typingEl.textContent = `Error: ${e}`
      typingEl.className = 'msg error'
    } finally {
      document.getElementById('send-btn').disabled = false
      input.focus()
    }
  }

  async function deleteSandbox() {
    if (!activeSandbox || !confirm('Delete this sandbox?')) return
    await activeSandbox.delete()
    addMsg('system', 'Sandbox deleted.')
    activeSandbox = null
    document.getElementById('sandbox-meta').style.display   = 'none'
    document.getElementById('config-editor').style.display  = 'none'
    document.getElementById('integrity-badge').style.display = 'none'
    document.getElementById('tamper-warn').style.display     = 'none'
    document.getElementById('chat-input').disabled  = true
    document.getElementById('send-btn').disabled    = true
    document.getElementById('del-btn').disabled     = true
    document.getElementById('history-btn').disabled = true
  }

  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })

  // ── Workbench ─────────────────────────────────────────────────────────────────
  async function doComplete() {
    const out = document.getElementById('bc-out')
    out.textContent = '…'
    try {
      out.textContent = await client.ai.complete({
        prompt:       document.getElementById('bc-prompt').value,
        systemPrompt: document.getElementById('bc-sys').value || undefined,
        model:        document.getElementById('bc-model').value || undefined,
        temperature:  parseFloat(document.getElementById('bc-temp').value),
        maxTokens:    parseInt(document.getElementById('bc-tokens').value),
      })
    } catch (e) { out.textContent = String(e) }
  }

  async function doStream() {
    const out = document.getElementById('bs-out')
    out.textContent = ''
    try {
      for await (const token of client.ai.stream({
        prompt:       document.getElementById('bs-prompt').value,
        systemPrompt: document.getElementById('bs-sys').value || undefined,
        model:        document.getElementById('bs-model').value || undefined,
      })) {
        out.textContent += token
      }
    } catch (e) { out.textContent = String(e) }
  }

  async function doEmbed() {
    const out = document.getElementById('be-out')
    out.textContent = '…'
    const lines = document.getElementById('be-text').value.split('\n').filter(Boolean)
    try {
      const vecs = await client.ai.embed(lines)
      out.textContent = vecs.map((v, i) =>
        `[${i}] dim=${v.length}  [${v.slice(0,4).map(x => x.toFixed(4)).join(', ')} …]`
      ).join('\n')
    } catch (e) { out.textContent = String(e) }
  }

  async function doImage() {
    const out = document.getElementById('bi-out')
    out.innerHTML = '<span style="opacity:0.5">Generating…</span>'
    try {
      const b64 = await client.ai.image(
        document.getElementById('bi-prompt').value,
        { steps: parseInt(document.getElementById('bi-steps').value) },
      )
      const img = document.createElement('img')
      img.src = `data:image/png;base64,${b64}`
      out.innerHTML = ''
      out.appendChild(img)
    } catch (e) { out.textContent = String(e) }
  }

  async function doTranscribe() {
    const fileInput = document.getElementById('bt-file')
    const out = document.getElementById('bt-out')
    if (!fileInput.files?.length) { out.textContent = 'Select an audio file first.'; return }
    out.textContent = 'Transcribing…'
    try {
      out.textContent = await client.ai.transcribe(fileInput.files[0])
    } catch (e) { out.textContent = String(e) }
  }

  // ── Config editor ─────────────────────────────────────────────────────────────
  async function saveConfig() {
    if (!activeSandbox) return
    const patch = {
      name:         document.getElementById('cfg-name').value,
      systemPrompt: document.getElementById('cfg-sys').value,
      model:        document.getElementById('cfg-model').value,
      temperature:  parseFloat(document.getElementById('cfg-temp').value),
      maxTokens:    parseInt(document.getElementById('cfg-tokens').value, 10),
    }
    const btn = document.getElementById('cfg-save-btn')
    btn.disabled = true; btn.textContent = 'Saving…'
    try {
      await activeSandbox.update(patch)
      activeSandbox = await client.sandbox.get(activeSandbox.id)
      populateSandboxUI(activeSandbox)
      setStatus('cfg', 'Saved')
    } catch (e) {
      setStatus('cfg', String(e), true)
    } finally {
      btn.disabled = false; btn.textContent = 'Save changes'
    }
  }

  // ── History viewer ────────────────────────────────────────────────────────────
  async function loadHistory() {
    if (!activeSandbox) return
    const msgs = document.getElementById('messages')
    msgs.innerHTML = ''
    const btn = document.getElementById('history-btn')
    btn.disabled = true; btn.textContent = 'Loading…'
    try {
      const history = await activeSandbox.history()
      if (!history.length) {
        addMsg('system', 'No conversation history yet.')
      } else {
        for (const m of history) {
          if (m.role !== 'system') addMsg(m.role, m.content)
        }
      }
    } catch (e) {
      addMsg('error', String(e))
    } finally {
      btn.disabled = false; btn.textContent = 'Load history'
    }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────────
  function setStatus(panel, msg, isErr = false) {
    const el = document.getElementById(`${panel}-status`)
    if (!el) return
    if (!msg) { el.style.display = 'none'; return }
    el.style.display = 'block'
    el.className = `status ${isErr ? 'err' : 'ok'}`
    el.textContent = msg
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ── Expose to inline onclick handlers ────────────────────────────────────────
  Object.assign(window, {
    switchTab, switchBench, doVibe, gotoChatFromVibe,
    copyEmbed, copyExport, loadSandbox, sendMessage, deleteSandbox, doImport,
    saveConfig, loadHistory,
    doComplete, doStream, doEmbed, doImage, doTranscribe,
  })
</script>
</body>
</html>
