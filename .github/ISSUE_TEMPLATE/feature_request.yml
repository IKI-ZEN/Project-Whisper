name: Feature Request
description: Propose a new feature or enhancement
labels:
  - enhancement

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: Zero runtime npm dependencies (native Web Platform APIs only)
        - label: Cloudflare-native infrastructure only (no external databases or brokers)
        - label: Must pass `npx tsc --noEmit`

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
    validations:
      required: false
