name: Bug Report
description: Report a defect in Aether-Lite
labels:
  - bug

body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Call POST /api/... with body ...\n2. ..."
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual-behaviour
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Aether-Lite version / commit
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Cloudflare environment
      options:
        - Workers (wrangler dev)
        - Workers (deployed)
        - Local simulation (wrangler dev --local)
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context / logs
    validations:
      required: false
